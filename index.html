<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro — Time de Pagamentos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
  .board{padding:1.5rem;max-width:1400px;margin:0 auto}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
  .header-left .title{font-size:20px;font-weight:600}
  .header-left .subtitle{font-size:13px;color:#888;margin-top:3px;display:flex;align-items:center;gap:5px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;flex-shrink:0;transition:background 0.3s}
  .status-dot.connected{background:#4caf50}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-size:13px;padding:7px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;transition:all 0.15s;font-weight:500}
  .btn:hover{background:#f0f0ee}
  .btn-reveal{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .btn-reveal:hover{background:#333}
  .btn-danger{border-color:#f5c6c6;color:#c0392b}
  .btn-danger:hover{background:#fff0f0}
  .columns{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}
  @media(max-width:900px){.columns{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:500px){.columns{grid-template-columns:1fr}}
  .col{background:#fff;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:340px;border:1px solid #e8e8e6}
  .col-header{display:flex;align-items:center;gap:7px;padding-bottom:10px;border-bottom:1px solid #f0f0ee;margin-bottom:2px}
  .col-icon{font-size:16px}
  .col-title{font-size:12px;font-weight:600;flex:1;line-height:1.3}
  .col-count{font-size:11px;color:#999;background:#f5f5f3;border-radius:20px;padding:2px 8px;border:1px solid #eee}
  .cards-area{display:flex;flex-direction:column;gap:7px;flex:1}
  .card{background:#fafaf8;border:1px solid #e8e8e6;border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5;animation:fadeIn 0.2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px}
  .card-anon{font-size:11px;color:#bbb;flex:1}
  .card-actions{display:flex;gap:5px}
  .like-btn{font-size:11px;color:#999;background:none;border:1px solid #e8e8e6;border-radius:20px;padding:2px 9px;cursor:pointer;transition:all 0.15s}
  .like-btn:hover,.like-btn.liked{background:#eef4ff;color:#3b7dd8;border-color:#b8d0f5;font-weight:600}
  .del-btn{font-size:11px;color:#ccc;background:none;border:1px solid #eee;border-radius:20px;padding:2px 8px;cursor:pointer;transition:all 0.15s}
  .del-btn:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
  .hidden-box{background:#f9f9f7;border:1px dashed #ddd;border-radius:10px;padding:12px;text-align:center;font-size:12px;color:#aaa;font-style:italic}

  /* card em criação */
  .new-card{background:#fafaf8;border:1px solid #b8d0f5;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;animation:fadeIn 0.15s ease}
  .new-card textarea{font-size:13px;padding:0;border:none;background:transparent;color:#1a1a1a;width:100%;resize:none;height:64px;font-family:inherit;outline:none;line-height:1.5}
  .new-card-footer{display:flex;justify-content:space-between;align-items:center}
  .new-card-hint{font-size:11px;color:#bbb}
  .new-card-actions{display:flex;gap:6px}
  .btn-enviar{font-size:12px;padding:4px 12px;border-radius:7px;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;cursor:pointer;font-family:inherit;transition:all 0.15s}
  .btn-enviar:hover{background:#333}
  .btn-enviar:disabled{opacity:0.4;cursor:not-allowed}
  .btn-cancelar{font-size:12px;padding:4px 10px;border-radius:7px;border:1px solid #ddd;background:transparent;color:#888;cursor:pointer;font-family:inherit;transition:all 0.15s}
  .btn-cancelar:hover{background:#f0f0ee}

  /* botão adicionar */
  .add-card-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#999;background:none;border:1px dashed #ddd;border-radius:10px;padding:9px 12px;cursor:pointer;width:100%;transition:all 0.15s;font-family:inherit;margin-top:auto}
  .add-card-btn:hover{border-color:#aaa;color:#555;background:#fafaf8}

  .mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:4px 0}
  .mood-opt{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 4px;border-radius:9px;border:1.5px solid transparent;transition:all 0.15s}
  .mood-opt:hover{background:#f5f5f3}
  .mood-opt.selected{border-color:#3b7dd8;background:#eef4ff}
  .mood-emoji{font-size:20px}
  .mood-label{font-size:9px;color:#999;text-align:center;line-height:1.2}
  .mood-result{font-size:12px;color:#888;text-align:center;padding:4px 0;font-style:italic}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000}
  .confirm-box{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
  .confirm-box h3{font-size:16px;margin-bottom:8px}
  .confirm-box p{font-size:13px;color:#888;margin-bottom:20px}
  .confirm-actions{display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>
<div class="board">
  <div class="header">
    <div class="header-left">
      <div class="title">Retro — Time de Pagamentos</div>
      <div class="subtitle">
        <span class="status-dot" id="dot"></span>
        <span id="subtitle">Conectando...</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-reveal" id="reveal-btn" onclick="toggleReveal()">👁 Revelar cards</button>
      <button class="btn btn-danger" onclick="confirmLimpar()">🗑 Limpar tudo</button>
      <button class="btn" onclick="exportBoard()">↓ Exportar</button>
    </div>
  </div>
  <div class="columns" id="board"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://nibdavavuzudwbxmrzbb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pYmRhdmF2dXp1ZHdieG1yemJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDI4NTUsImV4cCI6MjA5MjcxODg1NX0.jlGWrHmpzCtQ5BpQrJn5faC3gSC24ixUMAkql-gayAo';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: { params: { eventsPerSecond: 10 } }
});

const SESSAO_ID = 'retro-pagamentos';
const COLS = [
  {id:'mood',  icon:'🌡', title:'Como foi o sentimento da sprint?', type:'mood'},
  {id:'pride', icon:'🏆', title:'Mural do orgulho',                 type:'cards', ph:'O que o time pode se orgulhar?'},
  {id:'good',  icon:'✅', title:'O que deu bom?',                   type:'cards', ph:'O que repetimos na próxima sprint?'},
  {id:'bad',   icon:'📌', title:'O que não deu tão bom?',           type:'cards', ph:'O que podemos melhorar?'},
  {id:'action',icon:'🚀', title:'Ação da retro',                    type:'cards', ph:'Responsável · o que faremos?'},
];
const MOODS = [
  {e:'😔',l:'Difícil'},{e:'😕',l:'Abaixo'},{e:'😐',l:'Neutro'},{e:'😊',l:'Foi bem'},{e:'🤩',l:'Incrível!'}
];
const COL_IDS = COLS.map(c => c.id);

let cards    = {mood:[],pride:[],good:[],bad:[],action:[]};
let liked    = new Set();
let revealed = false;
let mood     = null;
let openCol  = null; // qual coluna está com o card aberto

function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function setStatus(ok){
  const dot = document.getElementById('dot');
  const sub = document.getElementById('subtitle');
  if(!dot||!sub) return;
  dot.className = 'status-dot'+(ok?' connected':'');
  sub.textContent = ok
    ? (revealed ? 'Cards visíveis · tempo real ativo' : 'Cards anônimos · tempo real ativo')
    : 'Reconectando...';
}

// ── Sessão ────────────────────────────────────────────────────────────────
async function loadSessao(){
  const { data } = await db.from('sessao').select('*').eq('id', SESSAO_ID).maybeSingle();
  if(data && data.humor !== null && data.humor !== undefined){
    mood = data.humor; render();
  }
}

async function saveMood(i){
  mood = i; render();
  await db.from('sessao').upsert({ id: SESSAO_ID, humor: i, atualizado_em: new Date().toISOString() });
}

// ── Cards ─────────────────────────────────────────────────────────────────
async function loadCards(){
  const { data, error } = await db.from('cards').select('*').order('criado_em', { ascending: true });
  if(error){ toast('Erro ao carregar'); return; }
  cards = {mood:[],pride:[],good:[],bad:[],action:[]};
  (data||[]).forEach(c => { if(COL_IDS.includes(c.coluna)) cards[c.coluna].push(c); });
  render();
}

function openNewCard(col){
  openCol = col; render();
  setTimeout(() => { const el = document.getElementById('new-inp-'+col); if(el) el.focus(); }, 50);
}

function cancelNewCard(){ openCol = null; render(); }

async function submitNewCard(col){
  const el = document.getElementById('new-inp-'+col);
  if(!el||!el.value.trim()) return;
  const btn = document.getElementById('new-btn-'+col);
  if(btn) btn.disabled = true;
  const text = el.value.trim();
  const { error } = await db.from('cards').insert({ coluna: col, texto: text, likes: 0 });
  if(error) toast('Erro ao salvar card');
  openCol = null;
  render();
}

async function deleteCard(id, col){
  cards[col] = cards[col].filter(c => c.id !== id);
  render();
  await db.from('cards').delete().eq('id', id);
}

async function likeCard(id, currentLikes, isLiked, col){
  if(isLiked){
    liked.delete(id);
    await db.from('cards').update({ likes: Math.max(0, currentLikes-1) }).eq('id', id);
  } else {
    liked.add(id);
    await db.from('cards').update({ likes: currentLikes+1 }).eq('id', id);
  }
}

// ── Limpar tudo ───────────────────────────────────────────────────────────
function confirmLimpar(){
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Limpar todos os cards?</h3>
      <p>Isso vai apagar todos os cards e o humor da sessão. Use no início de uma nova retro.</p>
      <div class="confirm-actions">
        <button class="btn" onclick="this.closest('.confirm-overlay').remove()">Cancelar</button>
        <button class="btn btn-danger" onclick="limparTudo(this)">Sim, limpar tudo</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function limparTudo(btn){
  btn.disabled = true; btn.textContent = 'Limpando...';
  await db.from('cards').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  await db.from('sessao').delete().eq('id', SESSAO_ID);
  cards = {mood:[],pride:[],good:[],bad:[],action:[]};
  mood = null; revealed = false; openCol = null;
  document.querySelector('.confirm-overlay')?.remove();
  render();
  toast('Board limpo! Pronto para nova retro 🎉');
}

// ── Render ────────────────────────────────────────────────────────────────
function cardHTML(c, colId){
  const isLiked = liked.has(c.id);
  return `<div class="card">
    <span>${esc(c.texto)}</span>
    <div class="card-footer">
      <span class="card-anon">anônimo</span>
      <div class="card-actions">
        <button class="like-btn${isLiked?' liked':''}" onclick="likeCard('${c.id}',${c.likes},${isLiked},'${colId}')">+1${c.likes>0?' · '+c.likes:''}</button>
        <button class="del-btn" onclick="deleteCard('${c.id}','${colId}')" title="Deletar">✕</button>
      </div>
    </div>
  </div>`;
}

function newCardHTML(col){
  return `<div class="new-card">
    <textarea id="new-inp-${col}" placeholder="Escreva seu card..." rows="3"></textarea>
    <div class="new-card-footer">
      <span class="new-card-hint">anônimo · Ctrl+Enter para enviar</span>
      <div class="new-card-actions">
        <button class="btn-cancelar" onclick="cancelNewCard()">Cancelar</button>
        <button class="btn-enviar" id="new-btn-${col}" onclick="submitNewCard('${col}')">Enviar</button>
      </div>
    </div>
  </div>`;
}

function addCardBtnHTML(col, label){
  return `<button class="add-card-btn" onclick="openNewCard('${col}')">+ ${label||'Adicionar card'}</button>`;
}

function hiddenBox(n, type){
  return `<div class="hidden-box">${type==='mood'?'💬':'📋'} ${n} card${n>1?'s':''} oculto${n>1?'s':''}</div>`;
}

function renderMoodCol(col){
  const cs = cards['mood'];
  const moodBtns = MOODS.map((m,i) =>
    `<div class="mood-opt${mood===i?' selected':''}" onclick="saveMood(${i})">
      <span class="mood-emoji">${m.e}</span>
      <span class="mood-label">${m.l}</span>
    </div>`).join('');
  const result = mood !== null
    ? `<div class="mood-result">${MOODS[mood].e} ${MOODS[mood].l}</div>`
    : `<div class="mood-result">clique para votar</div>`;
  const cardsHTML = revealed
    ? cs.map(c => cardHTML(c,'mood')).join('')
    : (cs.length > 0 ? hiddenBox(cs.length,'mood') : '');
  const addArea = openCol==='mood' ? newCardHTML('mood') : addCardBtnHTML('mood','Adicionar comentário');
  return `
    <div class="col-header">
      <span class="col-icon">${col.icon}</span>
      <span class="col-title">${col.title}</span>
      <span class="col-count">${cs.length}</span>
    </div>
    <div class="mood-grid">${moodBtns}</div>
    ${result}
    <div class="cards-area">${cardsHTML}</div>
    ${addArea}`;
}

function renderCardsCol(col){
  const cs = cards[col.id];
  const cardsHTML = revealed
    ? cs.map(c => cardHTML(c, col.id)).join('')
    : (cs.length > 0 ? hiddenBox(cs.length,'cards') : '');
  const addArea = openCol===col.id ? newCardHTML(col.id) : addCardBtnHTML(col.id,'Adicionar card');
  return `
    <div class="col-header">
      <span class="col-icon">${col.icon}</span>
      <span class="col-title">${col.title}</span>
      <span class="col-count">${cs.length}</span>
    </div>
    <div class="cards-area">${cardsHTML}</div>
    ${addArea}`;
}

function render(){
  const board = document.getElementById('board');
  if(!board) return;
  board.innerHTML = COLS.map(col =>
    `<div class="col">${col.type==='mood' ? renderMoodCol(col) : renderCardsCol(col)}</div>`
  ).join('');
  const btn = document.getElementById('reveal-btn');
  if(btn) btn.textContent = revealed ? '🙈 Ocultar cards' : '👁 Revelar cards';
}

function toggleReveal(){ revealed = !revealed; render(); setStatus(true); }

function exportBoard(){
  let out = 'RETROSPECTIVA — TIME DE PAGAMENTOS\n'+'='.repeat(38)+'\n\n';
  COLS.forEach(col => {
    out += col.icon+' '+col.title.toUpperCase()+'\n'+'-'.repeat(30)+'\n';
    if(col.id==='mood'&&mood!==null) out += 'Humor: '+MOODS[mood].e+' '+MOODS[mood].l+'\n';
    (cards[col.id]||[]).forEach((c,i) =>
      out += (i+1)+'. '+c.texto+(c.likes>0?' ('+c.likes+' votos)':'')+'\n'
    );
    out += '\n';
  });
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,'+encodeURIComponent(out);
  a.download = 'retro-pagamentos.txt'; a.click();
}

document.addEventListener('keydown', e => {
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)&&openCol){
    submitNewCard(openCol);
  }
  if(e.key==='Escape'&&openCol){ cancelNewCard(); }
});

// ── Realtime ──────────────────────────────────────────────────────────────
function setupRealtime(){
  db.channel('retro-v4')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'cards'}, payload => {
      try {
        const c = payload.new;
        if(!c||!c.coluna||!COL_IDS.includes(c.coluna)) return;
        if(cards[c.coluna].some(x => x.id===c.id)) return;
        cards[c.coluna].push(c);
        render();
      } catch(err){ console.error(err); }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'cards'}, payload => {
      try {
        const c = payload.new;
        if(!c||!c.coluna||!COL_IDS.includes(c.coluna)) return;
        cards[c.coluna] = cards[c.coluna].map(x => x.id===c.id ? c : x);
        render();
      } catch(err){ console.error(err); }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'cards'}, payload => {
      try {
        const id = payload.old?.id;
        if(!id) return;
        COL_IDS.forEach(col => { cards[col] = cards[col].filter(x => x.id!==id); });
        render();
      } catch(err){ console.error(err); }
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'sessao'}, payload => {
      try {
        const s = payload.new;
        if(s&&s.id===SESSAO_ID&&s.humor!==undefined){ mood = s.humor; render(); }
      } catch(err){ console.error(err); }
    })
    .subscribe(status => {
      setStatus(status==='SUBSCRIBED');
      if(status==='CLOSED'||status==='CHANNEL_ERROR') setTimeout(setupRealtime, 3000);
    });
}

render();
loadCards();
loadSessao();
setupRealtime();
</script>
</body>
</html>
